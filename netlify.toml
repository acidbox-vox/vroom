# netlify.toml
# ─────────────────────────────────────────────────────────────
# Netlify config สำหรับ Virtual Room (Firebase version)
# ไม่ต้องการ build command — เป็น static HTML ล้วน
# ─────────────────────────────────────────────────────────────

[build]
  publish = "."       # deploy จาก root folder

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
